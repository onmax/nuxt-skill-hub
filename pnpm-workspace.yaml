packages:
  - '.'
  - 'docs'

allowBuilds:
  '@parcel/watcher': true
  '@prisma/client': true
  '@prisma/engines': true
  esbuild: true
  prisma: true
  unrs-resolver: true
  vue-demi: true

catalogs:
  runtime:
    automd: ^0.4.3
    mlly: ^1.8.2
    unagent: ^0.0.8
  nuxt:
    '@nuxt/devtools': ^3.2.4
    '@nuxt/eslint-config': ^1.15.2
    '@nuxt/kit': ^4.4.6
    '@nuxt/module-builder': ^1.0.2
    '@nuxt/schema': ^4.4.6
    '@nuxt/test-utils': ^4.0.3
    nuxt: ^4.4.6
  quality:
    '@types/node': ^25.9.1
    '@vue/test-utils': ^2.4.10
    eslint: ^10.4.1
    happy-dom: ^20.9.0
    typescript: ~5.9.3
    vitest: ^4.1.7
    vue-tsc: ^3.3.3
  frontend:
    '@nuxt/ui': ^4.8.1
    '@resvg/resvg-js': ^2.6.2
    nuxt-og-image: ^6.5.1
    satori: ^0.26.0
    tailwindcss: ^4.3.0
    vue: ^3.5.35
  auth:
    '@onmax/nuxt-better-auth': 0.0.2-alpha.29
    better-auth: ^1.6.13
  cloud:
    '@nuxthub/core': ^0.10.7
  release:
    bumpp: ^11.1.0
